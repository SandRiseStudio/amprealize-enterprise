# =============================================================================
# Amprealize Gateway — nginx.prod.conf
# =============================================================================
# Production configuration for Fly.io.  Cloudflare terminates TLS and proxies
# plain HTTP to this container on port 8080.  nginx sits in front of uvicorn
# (127.0.0.1:8000) inside the same container, managed by supervisord.
#
# Key differences from the self-hosted nginx.conf:
#   - No static web-console serving  (Cloudflare Pages handles app.amprealize.ai)
#   - No TLS termination             (Cloudflare handles it)
#   - No dynamic DNS resolver        (upstream is always 127.0.0.1:8000)
#   - Cloudflare real-IP restoration via CF-Connecting-IP
#   - Keepalive upstream pool        (reduces uvicorn socket overhead)
#   - Listen on 8080                 (Fly.io internal_port)
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss;

    # -------------------------------------------------------------------------
    # WebSocket Upgrade Map
    # -------------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    # -------------------------------------------------------------------------
    # Cloudflare Real-IP Restoration
    # -------------------------------------------------------------------------
    # Cloudflare sends the actual client IP in CF-Connecting-IP.  Declare all
    # Cloudflare egress ranges as trusted so $remote_addr reflects the real
    # client rather than a Cloudflare edge node.
    # Ranges: https://www.cloudflare.com/ips/  (updated 2025-01)
    real_ip_header CF-Connecting-IP;
    # IPv4
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    # IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    # Fly.io internal network and loopback (health checks, supervisord probes)
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 127.0.0.1;

    # -------------------------------------------------------------------------
    # CORS Preflight Map
    # -------------------------------------------------------------------------
    # Detect OPTIONS at the http level so location blocks can short-circuit
    # them to @cors_preflight before they reach rate limiting or upstream.
    map $request_method $is_preflight {
        OPTIONS   1;
        default   0;
    }

    # -------------------------------------------------------------------------
    # Rate Limiting Zones (keyed on real client IP after CF restoration)
    # -------------------------------------------------------------------------
    # API: 100 req/s per IP, burst 200 nodelay — same as self-hosted.
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    # WebSocket/SSE: 10 connections/s per client IP.
    limit_req_zone $binary_remote_addr zone=ws:10m rate=10r/s;
    # Connection-level limit (protects against slow-loris style attacks).
    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

    # -------------------------------------------------------------------------
    # Upstream: uvicorn on localhost with keepalive pooling
    # -------------------------------------------------------------------------
    upstream amprealize_api {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # Logging (JSON, stdout-friendly for Fly.io log shipping)
    # -------------------------------------------------------------------------
    log_format amprealize_json escape=json '{'
        '"time": "$time_iso8601",'
        '"remote_addr": "$remote_addr",'
        '"method": "$request_method",'
        '"uri": "$request_uri",'
        '"status": $status,'
        '"bytes": $body_bytes_sent,'
        '"request_time": $request_time,'
        '"upstream_time": "$upstream_response_time",'
        '"user_agent": "$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log amprealize_json;

    # -------------------------------------------------------------------------
    # Server Block
    # -------------------------------------------------------------------------
    server {
        listen 8080;
        listen [::]:8080;
        server_name _;

        # Security headers on all API responses.
        # (Cloudflare Pages sets these for the web console separately.)
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        # Cloudflare always enforces HTTPS externally; propagate HSTS upstream.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # -----------------------------------------------------------------
        # CORS Preflight Handler (named location)
        # -----------------------------------------------------------------
        # OPTIONS requests are routed here via `return 418` + error_page 418
        # so they receive a 204 with CORS headers without touching rate
        # limiting or the upstream FastAPI process.
        location @cors_preflight {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Tenant-Id" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        # -----------------------------------------------------------------
        # Rate-limit error handler — adds CORS so browsers can read the 429
        # -----------------------------------------------------------------
        # nginx-generated 429s bypass FastAPI's CORSMiddleware, causing the
        # browser to treat them as a CORS violation instead of a 429.
        error_page 429 = @rate_limited;

        location @rate_limited {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Tenant-Id" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Type "application/json" always;
            add_header Retry-After 1 always;
            return 429 '{"detail":"Rate limit exceeded. Please retry shortly."}';
        }

        # -----------------------------------------------------------------
        # nginx-local health (no upstream dependency)
        # Used by the container HEALTHCHECK and Fly.io machine health probe.
        # -----------------------------------------------------------------
        location /nginx-health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # -----------------------------------------------------------------
        # Health / Ready — no rate limiting (Fly.io health checks hit these)
        # -----------------------------------------------------------------
        location /health {
            access_log off;
            proxy_pass http://amprealize_api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        location /ready {
            access_log off;
            proxy_pass http://amprealize_api/ready;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        location /metrics {
            proxy_pass http://amprealize_api/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # -----------------------------------------------------------------
        # API Endpoints — rate limited
        # -----------------------------------------------------------------
        location /api/ {
            if ($is_preflight) {
                return 418;
            }
            error_page 418 = @cors_preflight;

            limit_req zone=api burst=200 nodelay;
            limit_req_status 429;
            limit_conn per_ip_conn 100;
            limit_conn_status 429;

            proxy_pass http://amprealize_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Pass the protocol Cloudflare used (always https in production).
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            # WebSocket upgrade passthrough (e.g. /api/v1/conversations/*/ws)
            proxy_set_header Upgrade $http_upgrade;
            # Security: strip client-supplied identity headers — auth-derived only.
            proxy_set_header X-Tenant-Id "";
            proxy_set_header X-User-Id "";
            proxy_set_header X-User-Plan "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        location /v1/ {
            if ($is_preflight) {
                return 418;
            }
            error_page 418 = @cors_preflight;

            limit_req zone=api burst=200 nodelay;
            limit_req_status 429;
            limit_conn per_ip_conn 100;
            limit_conn_status 429;

            proxy_pass http://amprealize_api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Tenant-Id "";
            proxy_set_header X-User-Id "";
            proxy_set_header X-User-Plan "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }

        # -----------------------------------------------------------------
        # WebSocket Endpoints
        # -----------------------------------------------------------------
        location /ws/ {
            limit_req zone=ws burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://amprealize_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Tenant-Id "";
            proxy_set_header X-User-Id "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            proxy_buffering off;
        }

        # -----------------------------------------------------------------
        # Server-Sent Events (SSE)
        # -----------------------------------------------------------------
        location /sse/ {
            limit_req zone=ws burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://amprealize_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Cache-Control no-cache;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Tenant-Id "";
            proxy_set_header X-User-Id "";

            proxy_read_timeout 3600s;
            proxy_buffering off;
            chunked_transfer_encoding off;
        }

        # -----------------------------------------------------------------
        # MCP Protocol
        # -----------------------------------------------------------------
        location /mcp/ {
            limit_req zone=api burst=200 nodelay;
            limit_req_status 429;

            proxy_pass http://amprealize_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Tenant-Id "";
            proxy_set_header X-User-Id "";

            proxy_read_timeout 300s;
        }
    }
}
