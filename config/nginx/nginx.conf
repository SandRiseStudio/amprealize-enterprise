# =============================================================================
# Amprealize Gateway - nginx.conf
# =============================================================================
# Phase 0 Implementation (AGENT_EXECUTION_ARCHITECTURE.md)
#
# Edge gateway providing:
#   - Rate limiting per tenant (100r/s API, 10r/s WebSocket)
#   - WebSocket upgrade support for real-time collaboration
#   - Health check passthrough (no rate limiting)
#   - SSE streaming support
#   - TLS termination (production)
#
# Port: 8080 (gateway) -> 8000 (amprealize-api)
#
# NOTE: Uses dynamic DNS resolution via resolver directive to allow nginx
# to start before the API container is fully available. This is essential
# for container orchestration where service startup order isn't guaranteed.
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss;

    # -------------------------------------------------------------------------
    # WebSocket Upgrade Map
    # -------------------------------------------------------------------------
    # Used by web-console proxy (Vite HMR) and any future mixed-traffic
    # location blocks that serve both HTTP and WebSocket on the same path.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    # -------------------------------------------------------------------------
    # Dynamic DNS Resolution
    # -------------------------------------------------------------------------
    # Container DNS resolution for service discovery.
    # - Docker uses 127.0.0.11 (embedded DNS)
    # - Podman uses network gateway IP (typically 10.89.0.1 for aardvark-dns)
    # Using ${NGINX_RESOLVER} with envsubst, falling back to Podman default.
    # valid=5s means DNS results are cached for 5 seconds (helps with startup).
    resolver ${NGINX_RESOLVER} valid=5s ipv6=off;
    resolver_timeout 10s;

    # -------------------------------------------------------------------------
    # CORS Preflight Map
    # -------------------------------------------------------------------------
    # Detect OPTIONS requests at the http level so location blocks can route
    # them to @cors_preflight without using `if` in location context.
    # FastAPI's CORSMiddleware handles CORS on actual requests; this only
    # short-circuits browser preflight before it hits rate limiting.
    map $request_method $is_preflight {
        OPTIONS   1;
        default   0;
    }

    # -------------------------------------------------------------------------
    # Rate Limiting Zones (per client IP)
    # -------------------------------------------------------------------------
    # API: 100 requests/second per IP with burst allowance for spikes.
    # Tenant-based keying was removed — tenant is now derived from JWT
    # in the application layer (AuthMiddleware → TenantMiddleware).
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

    # WebSocket/SSE: 10 connections/second per client IP
    limit_req_zone $binary_remote_addr zone=ws:10m rate=10r/s;

    # Static assets (web console): lighter limit for SPA resources
    limit_req_zone $binary_remote_addr zone=static:10m rate=50r/s;

    # Connection limits per client IP
    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

    # -------------------------------------------------------------------------
    # Logging
    # NOTE: tenant_id / user_id will always be empty because the edge now
    # strips X-Tenant-Id and X-User-Id.  The fields are kept for forward-
    # compatibility if a future trusted internal header is introduced.
    # -------------------------------------------------------------------------
    log_format amprealize_json escape=json '{'
        '"time": "$time_iso8601",'
        '"remote_addr": "$remote_addr",'
        '"method": "$request_method",'
        '"uri": "$request_uri",'
        '"status": $status,'
        '"bytes": $body_bytes_sent,'
        '"request_time": $request_time,'
        '"upstream_time": "$upstream_response_time",'
        '"tenant_id": "$http_x_tenant_id",'
        '"user_id": "$http_x_user_id",'
        '"user_agent": "$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log amprealize_json;

    # -------------------------------------------------------------------------
    # Server Block
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Optional TLS — generated by docker-entrypoint.sh when
        # NGINX_SSL_CERT and NGINX_SSL_KEY are provided.
        include /etc/nginx/conf.d/tls.conf;

        # Define upstreams as variables for dynamic DNS resolution.
        # Host/port are injected by docker-entrypoint.sh via envsubst so
        # CI can override them (e.g. UPSTREAM_API_HOST=host.containers.internal).
        set $upstream_api $UPSTREAM_API_HOST:$UPSTREAM_API_PORT;
        set $upstream_web_console $UPSTREAM_WEB_CONSOLE_HOST:$UPSTREAM_WEB_CONSOLE_PORT;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;

        # -----------------------------------------------------------------
        # CORS Preflight Handler (named location)
        # -----------------------------------------------------------------
        # Reached via error_page 418 when $is_preflight == 1.
        # Returns 204 with permissive CORS headers so browser preflights
        # bypass rate limiting and upstream entirely.
        location @cors_preflight {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Tenant-Id, X-Web-Perf-Session" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        # -----------------------------------------------------------------
        # Rate-limit error handler with CORS
        # -----------------------------------------------------------------
        # When nginx itself returns 429 (from limit_req/limit_conn) the
        # response never reaches FastAPI's CORSMiddleware, so the browser
        # blocks it as a CORS violation.  Route 429s to a named location
        # that adds CORS headers.  The `= 429` preserves the status code.
        error_page 429 = @rate_limited;

        location @rate_limited {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Tenant-Id, X-Web-Perf-Session" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Type "application/json" always;
            add_header Retry-After 1 always;
            return 429 '{"detail":"Rate limit exceeded. Please retry shortly."}';
        }

        # ---------------------------------------------------------------------
        # Nginx-local health (no upstream dependency, used by container healthcheck)
        # ---------------------------------------------------------------------
        location /nginx-health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # ---------------------------------------------------------------------
        # Health/Ready - No rate limiting
        # ---------------------------------------------------------------------
        location /health {
            access_log off;
            proxy_pass http://$upstream_api/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        location /ready {
            access_log off;
            proxy_pass http://$upstream_api/ready;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        location /metrics {
            proxy_pass http://$upstream_api/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---------------------------------------------------------------------
        # Conversation WebSocket — dedicated block (buffering breaks some WS clients)
        # ---------------------------------------------------------------------
        location ~* ^/api/v1/conversations/[^/]+/ws$ {
            if ($is_preflight) {
                return 418;
            }
            error_page 418 = @cors_preflight;

            limit_req zone=api burst=200 nodelay;
            limit_req_status 429;
            limit_conn per_ip_conn 100;
            limit_conn_status 429;

            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Tenant-Id "";
            proxy_set_header X-User-Id "";
            proxy_set_header X-User-Plan "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;

            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # ---------------------------------------------------------------------
        # API Endpoints - Rate limited
        # ---------------------------------------------------------------------
        location /api/ {
            # Route OPTIONS preflight to @cors_preflight (bypasses rate limiting)
            if ($is_preflight) {
                return 418;
            }
            error_page 418 = @cors_preflight;

            limit_req zone=api burst=200 nodelay;
            limit_req_status 429;
            limit_conn per_ip_conn 100;
            limit_conn_status 429;

            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket upgrade support for /api/v1/conversations/*/ws etc.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Security: strip client-supplied identity headers — tenant
            # and user are now derived from the JWT by AuthMiddleware.
            proxy_set_header X-Tenant-Id "";
            proxy_set_header X-User-Id "";
            proxy_set_header X-User-Plan "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        location /v1/ {
            # Route OPTIONS preflight to @cors_preflight (bypasses rate limiting)
            if ($is_preflight) {
                return 418;
            }
            error_page 418 = @cors_preflight;

            limit_req zone=api burst=200 nodelay;
            limit_req_status 429;
            limit_conn per_ip_conn 100;
            limit_conn_status 429;

            proxy_pass http://$upstream_api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Security: strip client-supplied identity headers
            proxy_set_header X-Tenant-Id "";
            proxy_set_header X-User-Id "";
            proxy_set_header X-User-Plan "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }

        # ---------------------------------------------------------------------
        # WebSocket Endpoints
        # ---------------------------------------------------------------------
        location /ws/ {
            limit_req zone=ws burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Security: strip client-supplied identity headers
            proxy_set_header X-Tenant-Id "";
            proxy_set_header X-User-Id "";

            # 1 hour timeout for persistent connections
            proxy_connect_timeout 30s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            proxy_buffering off;
        }

        # ---------------------------------------------------------------------
        # Server-Sent Events (SSE)
        # ---------------------------------------------------------------------
        location /sse/ {
            limit_req zone=ws burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Cache-Control no-cache;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Security: strip client-supplied identity headers
            proxy_set_header X-Tenant-Id "";
            proxy_set_header X-User-Id "";

            proxy_read_timeout 3600s;
            proxy_buffering off;
            chunked_transfer_encoding off;
        }

        # ---------------------------------------------------------------------
        # MCP Protocol
        # ---------------------------------------------------------------------
        location /mcp/ {
            limit_req zone=api burst=200 nodelay;
            limit_req_status 429;

            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Security: strip client-supplied identity headers
            proxy_set_header X-Tenant-Id "";
            proxy_set_header X-User-Id "";

            proxy_read_timeout 300s;
        }

        # ---------------------------------------------------------------------
        # Web Console (SPA + Vite HMR in dev)
        # ---------------------------------------------------------------------
        # In dev mode, proxies to the Vite dev server.
        # In production, replace with `root /app/dist; try_files $uri /index.html;`
        # WebSocket upgrade support is required for Vite Hot Module Replacement.
        location / {
            limit_req zone=static burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://$upstream_web_console;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade for Vite HMR
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # Optional HTTP→HTTPS redirect server block — generated by
    # docker-entrypoint.sh when NGINX_SSL_REDIRECT=true.
    include /etc/nginx/conf.d/tls-redirect.conf;
}
