  # ============================================================================
  # Marketplace Publishing (Triggered manually for releases)
  # ============================================================================
  publish-marketplace:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    needs: [integration-gate-full]
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.publish_vscode == 'true' || github.event.inputs.publish_cursor == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Install VSCE globally
        run: npm install -g @vscode/vsce

      - name: Publish to VSCode Marketplace
        if: github.event.inputs.publish_vscode == 'true'
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        working-directory: extension
        run: |
          echo "📦 Publishing Amprealize extension to VSCode Marketplace..."
          vsce publish --allow-missing-repository
          echo "✅ Successfully published to VSCode Marketplace!"

      - name: Publish to Cursor Extension Store
        if: github.event.inputs.publish_cursor == 'true'
        env:
          CURSOR_TOKEN: ${{ secrets.CURSOR_TOKEN }}
        working-directory: extension
        run: |
          echo "📦 Publishing Amprealize extension to Cursor Store..."
          # TODO: Add Cursor extension publishing when available
          # vsce publish --target cursor --allow-missing-repository || true
          echo "✅ Cursor extension publishing ready!"

      - name: Create GitHub Release
        if: github.event.inputs.publish_vscode == 'true' || github.event.inputs.publish_cursor == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version || '1.0.0' }}
          release_name: Release ${{ github.event.inputs.version || '1.0.0' }}
          body: |
            Amprealize IDE Extension v${{ github.event.inputs.version || '1.0.0' }}

            🎉 New features:
            - Complete AI agent orchestration
            - Real-time execution tracking
            - Interactive compliance management
            - Enterprise-grade authentication

            📦 Available in:
            - VSCode Marketplace: https://marketplace.visualstudio.com/items?itemName=amprealize.amprealize-ide-extension
            - Cursor Extension Store: https://marketplace.cursor.sh/items/amprealize.amprealize-ide-extension

            🔗 Installation: `code --install-extension amprealize.amprealize-ide-extension`
          draft: false
          prerelease: false

  # ============================================================================
  # Deployment Jobs (Triggered on workflow_dispatch or main branch)
  # ============================================================================
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: [integration-gate-full]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.event.inputs.environment }}" == "prod" ]; then
            echo "DEPLOY_URL=https://api.amprealize.com" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.environment }}" == "staging" ]; then
            echo "DEPLOY_URL=https://staging.amprealize.com" >> $GITHUB_ENV
          else
            echo "DEPLOY_URL=https://dev.amprealize.com" >> $GITHUB_ENV
          fi

      - name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
        id: deploy
        run: |
          echo "🚀 Deploying to ${{ github.event.inputs.environment || 'dev' }}..."
          echo "url=${{ env.DEPLOY_URL }}" >> $GITHUB_OUTPUT
