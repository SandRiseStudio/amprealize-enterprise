name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      publish_vscode:
        description: 'Publish to VSCode Marketplace'
        required: false
        default: false
        type: boolean
      publish_cursor:
        description: 'Publish to Cursor Extension Store'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION_DEFAULT: "3.11"
  NODE_VERSION: "20"

jobs:
  # ============================================================================
  # Security & Pre-Commit Checks
  # ============================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for gitleaks

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install Amprealize package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install pre-commit
        run: |
          pip install pre-commit
          ./scripts/install_hooks.sh
          pre-commit --version

      - name: Run gitleaks secret scan
        id: gitleaks
        run: |
          mkdir -p security/scan_reports
          if ./scripts/scan_secrets.sh; then
            echo "scan_status=passed" >> $GITHUB_OUTPUT
          else
            echo "scan_status=failed" >> $GITHUB_OUTPUT
            # Always fail the step if secrets are found
            exit 1
          fi

      - name: Check merge blocking policy
        if: failure() && steps.gitleaks.outputs.scan_status == 'failed'
        run: |
          # Configurable merge blocking for secret scan failures
          # Set AMPREALIZE_SECURITY_BLOCK_ON_SECRETS=true in repository variables to enforce
          if [ "${{ vars.AMPREALIZE_SECURITY_BLOCK_ON_SECRETS }}" = "true" ]; then
            echo "::error::Secret scan failed and AMPREALIZE_SECURITY_BLOCK_ON_SECRETS is enabled."
            echo "::error::Merge is blocked until all secrets are removed or allowlisted in .gitleaks.toml"
            echo ""
            echo "To remediate:"
            echo "  1. Review the scan report in the artifacts"
            echo "  2. Remove real secrets and rotate credentials (behavior_rotate_leaked_credentials)"
            echo "  3. For false positives, add suppressions to .gitleaks.toml"
            echo "  4. Re-run the workflow"
            exit 1
          else
            echo "::warning::Secret scan found potential secrets but AMPREALIZE_SECURITY_BLOCK_ON_SECRETS is not enabled."
            echo "Consider enabling merge blocking for enhanced security."
          fi

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: security/scan_reports/
          retention-days: 30

  pre-commit:
    name: Pre-Commit Hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit checks
        run: pre-commit run --all-files --show-diff-on-failure

  # ============================================================================
  # Wheel packaging: MCP manifests + install smoke test
  # ============================================================================
  packaging-smoke:
    name: Wheel packaging and MCP manifests
    runs-on: ubuntu-latest
    needs: [pre-commit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Verify MCP manifest sync
        run: python scripts/verify_mcp_manifests_sync.py

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Assert tool JSON embedded in wheel
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          COUNT=$(unzip -l "$WHEEL" | grep -c 'amprealize/mcp_tool_manifests/.*\.json$' || true)
          if [ "$COUNT" -lt 200 ]; then
            echo "Expected >=200 MCP JSON files in wheel, found $COUNT"
            exit 1
          fi
          echo "Wheel contains $COUNT MCP tool manifest files"

      - name: Install wheel in clean venv and run MCP doctor
        run: |
          python -m venv /tmp/amprealize-wheel-venv
          /tmp/amprealize-wheel-venv/bin/pip install ./packages/breakeramp[cli] dist/*.whl
          /tmp/amprealize-wheel-venv/bin/amprealize mcp-server doctor

      - name: Validate wheel version matches .amprealize-version
        run: |
          /tmp/amprealize-wheel-venv/bin/pip install packaging
          /tmp/amprealize-wheel-venv/bin/python scripts/check_oss_version.py --package amprealize-enterprise --strict

  # ============================================================================
  # Python Tests
  # PRs / non-main pushes: Python 3.11 only for fast feedback
  # main / nightly / manual: full 3.10, 3.11, 3.12 matrix
  # ============================================================================
  test-python:
    name: Python Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: [security-scan, packaging-smoke]
    env:
      DATABASE_URL: postgresql://amprealize_behavior:behavior_test_pass@localhost:6433/amprealize_behavior
      AMPREALIZE_ALEMBIC_DATABASE_URL: postgresql://amprealize_behavior:behavior_test_pass@localhost:6433/amprealize_behavior
      AMPREALIZE_ALEMBIC_SCHEMA_READY: "1"
      AMPREALIZE_TEST_PER_SERVICE_PG_DATABASES: "0"
      REDIS_HOST: localhost
      REDIS_PORT: "6479"
      AMPREALIZE_PG_HOST_BEHAVIOR: localhost
      AMPREALIZE_PG_PORT_BEHAVIOR: "6433"
      AMPREALIZE_PG_USER_BEHAVIOR: amprealize_behavior
      AMPREALIZE_PG_PASS_BEHAVIOR: behavior_test_pass
      AMPREALIZE_PG_DB_BEHAVIOR: amprealize_behavior
      AMPREALIZE_PG_HOST_WORKFLOW: localhost
      AMPREALIZE_PG_PORT_WORKFLOW: "6433"
      AMPREALIZE_PG_USER_WORKFLOW: amprealize_behavior
      AMPREALIZE_PG_PASS_WORKFLOW: behavior_test_pass
      AMPREALIZE_PG_DB_WORKFLOW: amprealize_behavior
      AMPREALIZE_PG_HOST_ACTION: localhost
      AMPREALIZE_PG_PORT_ACTION: "6433"
      AMPREALIZE_PG_USER_ACTION: amprealize_behavior
      AMPREALIZE_PG_PASS_ACTION: behavior_test_pass
      AMPREALIZE_PG_DB_ACTION: amprealize_behavior
      AMPREALIZE_PG_HOST_RUN: localhost
      AMPREALIZE_PG_PORT_RUN: "6433"
      AMPREALIZE_PG_USER_RUN: amprealize_behavior
      AMPREALIZE_PG_PASS_RUN: behavior_test_pass
      AMPREALIZE_PG_DB_RUN: amprealize_behavior
      AMPREALIZE_PG_HOST_COMPLIANCE: localhost
      AMPREALIZE_PG_PORT_COMPLIANCE: "6433"
      AMPREALIZE_PG_USER_COMPLIANCE: amprealize_behavior
      AMPREALIZE_PG_PASS_COMPLIANCE: behavior_test_pass
      AMPREALIZE_PG_DB_COMPLIANCE: amprealize_behavior
      AMPREALIZE_PG_HOST_AUTH: localhost
      AMPREALIZE_PG_PORT_AUTH: "6433"
      AMPREALIZE_PG_USER_AUTH: amprealize_behavior
      AMPREALIZE_PG_PASS_AUTH: behavior_test_pass
      AMPREALIZE_PG_DB_AUTH: amprealize_behavior
      AMPREALIZE_COMPLIANCE_PG_DSN: postgresql://amprealize_behavior:behavior_test_pass@localhost:6433/amprealize_behavior?options=-csearch_path%3Dcompliance,auth,execution,board,behavior,workflow,audit,public  # pragma: allowlist secret
      AMPREALIZE_TELEMETRY_PG_DSN: postgresql://amprealize_telemetry:telemetry_test_pass@localhost:6438/amprealize_telemetry  # pragma: allowlist secret
      AMPREALIZE_PG_HOST_TELEMETRY: localhost
      AMPREALIZE_PG_PORT_TELEMETRY: "6438"
      AMPREALIZE_PG_USER_TELEMETRY: amprealize_telemetry
      AMPREALIZE_PG_PASS_TELEMETRY: telemetry_test_pass
      AMPREALIZE_PG_DB_TELEMETRY: amprealize_telemetry

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ${{ fromJson((github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')) && '["3.11"]' || '["3.10", "3.11", "3.12"]') }}

    # Modular monolith Postgres (6433) + telemetry + Redis (matches local Podman test stack defaults)
    services:
      postgres-behavior:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: amprealize_behavior
          POSTGRES_PASSWORD: behavior_test_pass
          POSTGRES_DB: amprealize_behavior
        ports:
          - 6433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --memory 256m

      postgres-telemetry:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: amprealize_telemetry
          POSTGRES_PASSWORD: telemetry_test_pass
          POSTGRES_DB: amprealize_telemetry
        ports:
          - 6438:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --memory 256m

      redis:
        image: redis:7-alpine
        ports:
          - 6479:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
          --memory 128m

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev postgresql-client redis-tools

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./packages/breakeramp[cli]
          pip install -e ./packages/midnighter
          pip install opensearch-py
          pip install -e ".[dev,postgres,telemetry,semantic]"

      - name: Validate OSS version pin
        run: python scripts/check_oss_version.py --package amprealize-enterprise

      - name: Wait for services to be ready
        run: |
          echo "Waiting for PostgreSQL (modulith + telemetry)..."
          for port in 6433 6438; do
            timeout 30 bash -c "until pg_isready -h localhost -p $port; do sleep 1; done" || exit 1
          done
          echo "Waiting for Redis..."
          timeout 30 bash -c "until redis-cli -h localhost -p 6479 ping; do sleep 1; done" || exit 1
          echo "All services ready!"

      - name: Run Alembic migrations
        run: python scripts/run_alembic_migrations.py

      - name: Check for raw TRUNCATE in tests
        run: bash scripts/check_no_raw_truncate.sh

      - name: Run pytest with coverage (parallel)
        run: |
          pytest -n auto \
            --cov=amprealize \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=30 \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Generate test report
        if: always()
        run: |
          pytest \
            --ignore=test_kafka_consume.py \
            --tb=short \
            --junit-xml=test-results-py${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results-py${{ matrix.python-version }}.xml
          retention-days: 30

  # ============================================================================
  # Service Parity Tests (Critical)
  # ============================================================================
  test-parity:
    name: Service Parity Tests
    runs-on: ubuntu-latest
    needs: [security-scan]
    env:
      DATABASE_URL: postgresql://amprealize_behavior:behavior_test_pass@localhost:6433/amprealize_behavior
      AMPREALIZE_ALEMBIC_DATABASE_URL: postgresql://amprealize_behavior:behavior_test_pass@localhost:6433/amprealize_behavior
      AMPREALIZE_ALEMBIC_SCHEMA_READY: "1"
      AMPREALIZE_TEST_PER_SERVICE_PG_DATABASES: "0"
      REDIS_HOST: localhost
      REDIS_PORT: "6479"
      AMPREALIZE_PG_HOST_BEHAVIOR: localhost
      AMPREALIZE_PG_PORT_BEHAVIOR: "6433"
      AMPREALIZE_PG_USER_BEHAVIOR: amprealize_behavior
      AMPREALIZE_PG_PASS_BEHAVIOR: behavior_test_pass
      AMPREALIZE_PG_DB_BEHAVIOR: amprealize_behavior
      AMPREALIZE_PG_HOST_WORKFLOW: localhost
      AMPREALIZE_PG_PORT_WORKFLOW: "6433"
      AMPREALIZE_PG_USER_WORKFLOW: amprealize_behavior
      AMPREALIZE_PG_PASS_WORKFLOW: behavior_test_pass
      AMPREALIZE_PG_DB_WORKFLOW: amprealize_behavior
      AMPREALIZE_PG_HOST_ACTION: localhost
      AMPREALIZE_PG_PORT_ACTION: "6433"
      AMPREALIZE_PG_USER_ACTION: amprealize_behavior
      AMPREALIZE_PG_PASS_ACTION: behavior_test_pass
      AMPREALIZE_PG_DB_ACTION: amprealize_behavior
      AMPREALIZE_PG_HOST_RUN: localhost
      AMPREALIZE_PG_PORT_RUN: "6433"
      AMPREALIZE_PG_USER_RUN: amprealize_behavior
      AMPREALIZE_PG_PASS_RUN: behavior_test_pass
      AMPREALIZE_PG_DB_RUN: amprealize_behavior
      AMPREALIZE_PG_HOST_COMPLIANCE: localhost
      AMPREALIZE_PG_PORT_COMPLIANCE: "6433"
      AMPREALIZE_PG_USER_COMPLIANCE: amprealize_behavior
      AMPREALIZE_PG_PASS_COMPLIANCE: behavior_test_pass
      AMPREALIZE_PG_DB_COMPLIANCE: amprealize_behavior
      AMPREALIZE_PG_HOST_AUTH: localhost
      AMPREALIZE_PG_PORT_AUTH: "6433"
      AMPREALIZE_PG_USER_AUTH: amprealize_behavior
      AMPREALIZE_PG_PASS_AUTH: behavior_test_pass
      AMPREALIZE_PG_DB_AUTH: amprealize_behavior
      AMPREALIZE_COMPLIANCE_PG_DSN: postgresql://amprealize_behavior:behavior_test_pass@localhost:6433/amprealize_behavior?options=-csearch_path%3Dcompliance,auth,execution,board,behavior,workflow,audit,public  # pragma: allowlist secret
      AMPREALIZE_TELEMETRY_PG_DSN: postgresql://amprealize_telemetry:telemetry_test_pass@localhost:6438/amprealize_telemetry  # pragma: allowlist secret
      AMPREALIZE_PG_HOST_TELEMETRY: localhost
      AMPREALIZE_PG_PORT_TELEMETRY: "6438"
      AMPREALIZE_PG_USER_TELEMETRY: amprealize_telemetry
      AMPREALIZE_PG_PASS_TELEMETRY: telemetry_test_pass
      AMPREALIZE_PG_DB_TELEMETRY: amprealize_telemetry

    services:
      postgres-behavior:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: amprealize_behavior
          POSTGRES_PASSWORD: behavior_test_pass
          POSTGRES_DB: amprealize_behavior
        ports:
          - 6433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --memory 256m

      postgres-telemetry:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: amprealize_telemetry
          POSTGRES_PASSWORD: telemetry_test_pass
          POSTGRES_DB: amprealize_telemetry
        ports:
          - 6438:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --memory 256m

      redis:
        image: redis:7-alpine
        ports:
          - 6479:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
          --memory 128m

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client redis-tools

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./packages/breakeramp[cli]
          pip install -e ./packages/midnighter
          pip install opensearch-py
          pip install -e ".[dev,semantic]"

      - name: Wait for services to be ready
        run: |
          echo "Waiting for PostgreSQL (modulith + telemetry)..."
          for port in 6433 6438; do
            timeout 30 bash -c "until pg_isready -h localhost -p $port; do sleep 1; done" || exit 1
          done
          echo "Waiting for Redis..."
          timeout 30 bash -c "until redis-cli -h localhost -p 6479 ping; do sleep 1; done" || exit 1
          echo "All services ready!"

      - name: Run Alembic migrations
        run: python scripts/run_alembic_migrations.py

      - name: Run all parity tests
        run: |
          pytest tests/test_*_parity.py -v --tb=short

      - name: Run cross-surface consistency tests
        run: |
          pytest tests/test_cross_surface_consistency.py -v --tb=short

      - name: Run MCP device flow tests
        run: |
          pytest tests/test_mcp_device_flow.py -v --tb=short

      - name: Generate parity coverage matrix
        if: always()
        run: |
          python tests/test_all_service_parity.py > parity-coverage-report.txt || true

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-coverage-report
          path: parity-coverage-report.txt
          retention-days: 30

  # ============================================================================
  # GUIDEAI-5 / M2 — prod API device-flow smoke (no secrets; public endpoints)
  # ============================================================================
  device-flow-api-smoke:
    name: Device flow API smoke (prod)
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./packages/breakeramp[cli]
          pip install -e ".[dev]"

      - name: Remote device-flow checks
        env:
          AMPREALIZE_REMOTE_DEVICE_FLOW_SMOKE: "1"
        run: |
          pytest tests/integration/test_api_device_flow_remote_smoke.py -v --tb=short

  # ============================================================================
  # GUIDEAI-5 / M2 — staging device-flow integration (prod API, non-manual tests)
  # Points at production API. Manual OAuth tests are skipped; non-interactive
  # health, auth-status, and token-persistence tests run cleanly.
  # ============================================================================
  staging-device-flow:
    name: Staging device flow integration
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./packages/breakeramp[cli]
          pip install -e ".[dev]"
          pip install requests urllib3

      - name: Run staging device-flow tests (non-manual)
        env:
          AMPREALIZE_GATEWAY_URL: ${{ secrets.AMPREALIZE_STAGING_API_URL || 'https://api.amprealize.ai' }}
        run: |
          pytest tests/integration/test_staging_device_flow.py \
            -v --tb=short \
            -m "not manual" \
            --timeout=30

  # ============================================================================
  # MCP Server Validation
  # ============================================================================
  test-mcp-server:
    name: MCP Server Protocol Tests
    runs-on: ubuntu-latest
    needs: [security-scan]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./packages/breakeramp[cli]
          pip install -e ".[dev]"

      - name: Run MCP server validation
        run: |
          python tests/examples/test_mcp_server.py

      - name: Test MCP server startup
        run: |
          timeout 5 python -m amprealize.mcp_server <<< '{"jsonrpc":"2.0","id":1,"method":"ping"}' || true

  # ============================================================================
  # Dashboard Build & Tests
  # ============================================================================
  test-dashboard:
    name: Dashboard Build & Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web-console/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: web-console/dashboard
        run: npm ci

      - name: Run linter
        working-directory: web-console/dashboard
        run: npm run lint || true

      - name: Build dashboard
        working-directory: web-console/dashboard
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: web-console/dashboard/dist/
          retention-days: 7

  # ============================================================================
  # VS Code Extension Build
  # ============================================================================
  test-extension:
    name: VS Code Extension Build
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Compile extension
        working-directory: extension
        run: npm run compile

      - name: Package extension
        working-directory: extension
        run: |
          npm install -g @vscode/vsce
          vsce package --allow-missing-repository || true

      - name: Upload VSIX
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: extension/*.vsix
          retention-days: 7

  # ============================================================================
  # Fast Integration Gate (PRs / non-main pushes)
  # ============================================================================
  integration-gate-fast:
    name: Integration Gate (Fast)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
    needs:
      - security-scan
      - pre-commit
      - packaging-smoke
      - test-python
      - test-parity
      - test-mcp-server

    steps:
      - name: All checks passed
        run: |
          echo "✅ Fast CI checks passed successfully!"
          echo "✅ Security scan: PASSED"
          echo "✅ Pre-commit hooks: PASSED"
          echo "✅ Wheel packaging + MCP manifests: PASSED"
          echo "✅ Python tests (3.11): PASSED"
          echo "✅ Service parity tests: PASSED"
          echo "✅ MCP server validation: PASSED"
          echo ""
          echo "🎉 Ready for merge review!"

  # ============================================================================
  # Full Integration Gate (main / nightly / manual)
  # ============================================================================
  integration-gate-full:
    name: Integration Gate (Full)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs:
      - security-scan
      - pre-commit
      - packaging-smoke
      - test-python
      - test-parity
