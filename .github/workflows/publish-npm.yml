name: Publish to npm

# SAFETY: npm publishing must only happen from the OSS repository. See the
# guard in publish-pypi.yml for the rationale; Lane B tracks OSS release
# automation.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not publish)'
        required: false
        default: true
        type: boolean

env:
  OSS_REPO: "amprealize/amprealize"

defaults:
  run:
    working-directory: packages/npm

jobs:
  guard:
    name: Enterprise repo guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Abort if not OSS repo
        run: |
          if [ "${GITHUB_REPOSITORY}" != "${OSS_REPO}" ]; then
            echo "::error::publish-npm.yml must only run from ${OSS_REPO} — running on ${GITHUB_REPOSITORY}. Refusing."
            exit 1
          fi

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: guard
    permissions:
      contents: read
      id-token: write  # npm provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version from release tag
        if: github.event_name == 'release'
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Test wrapper
        run: node bin/amprealize.js --npm-wrapper-version

      - name: Publish (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: github.event_name == 'release' || github.event.inputs.dry_run != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  verify:
    name: Verify Installation
    needs: publish
    if: github.event_name == 'release'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['18', '20', '22']

    steps:
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Amprealize Python package
        run: pip install amprealize

      - name: Wait for npm propagation
        run: sleep 30

      - name: Install from npm
        run: npm install -g @amprealize/cli

      - name: Verify CLI
        run: amprealize --version
