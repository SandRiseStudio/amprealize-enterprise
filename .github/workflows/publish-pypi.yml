name: Publish to PyPI

# SAFETY: PyPI publishing must only happen from the OSS repository
# (amprealize/amprealize). If this workflow is ever triggered on the
# enterprise repo it would leak enterprise-only sources. The guard below
# no-ops the build on any non-OSS repo. The canonical workflow lives at
# https://github.com/amprealize/amprealize/blob/main/.github/workflows/publish-pypi.yml
# and Lane B (GUIDEAI-5) tracks its continued maintenance.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Publishing target'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

env:
  PYTHON_VERSION: "3.11"
  OSS_REPO: "amprealize/amprealize"

jobs:
  guard:
    name: Enterprise repo guard
    runs-on: ubuntu-latest
    steps:
      - name: Abort if not OSS repo
        run: |
          if [ "${GITHUB_REPOSITORY}" != "${OSS_REPO}" ]; then
            echo "::error::publish-pypi.yml must only run from ${OSS_REPO} — running on ${GITHUB_REPOSITORY}. Refusing."
            exit 1
          fi

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: guard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify MCP tool manifests are synced for the wheel
        run: python scripts/verify_mcp_manifests_sync.py

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 5

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/amprealize/
    permissions:
      id-token: write  # OIDC publishing

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/amprealize/
    permissions:
      id-token: write  # OIDC publishing (Trusted Publishers)

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  verify-installation:
    name: Verify Installation
    needs: [publish-pypi]
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'release'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Wait for PyPI propagation
        run: sleep 60

      - name: Install from PyPI
        run: pip install amprealize

      - name: Verify CLI installation
        run: |
          amprealize --version
          amprealize doctor --json
          amprealize mcp-server doctor

      - name: Verify import
        run: python -c "import amprealize; print(f'Amprealize {amprealize.__version__} installed successfully')"
