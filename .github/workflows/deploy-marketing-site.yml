name: Deploy marketing site (Astro)

# GUIDEAI-20 — static marketing site at apex; wiki passthrough is opt-in (`public/_redirects`).
# Same-origin wiki is handled by `marketing-site/functions/_middleware.js` (WIKI_UPSTREAM).
# Create Cloudflare Pages project `amprealize-marketing` (or override below)
# before first deploy. Apex DNS cutover is manual; see marketing-site/README.md.

on:
  workflow_dispatch:
    inputs:
      legacy_wiki_base:
        description: >-
          Optional: set to e.g. https://amprealize-web.pages.dev to emit /wiki/* and / → wiki
          redirects from this Pages project. Leave empty so amprealize.ai serves only the
          marketing Astro site (landing, pricing, etc.).
        type: string
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - "marketing-site/**"
      - ".github/workflows/deploy-marketing-site.yml"

concurrency:
  group: deploy-marketing-site-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy marketing site
    runs-on: ubuntu-latest
    environment: prod-saas
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: marketing-site/package-lock.json
      - name: Install and build
        working-directory: marketing-site
        env:
          # Empty = no _redirects wiki rules (recommended when apex shows marketing only).
          # If set, must not equal this site’s own apex host or /wiki/* will loop.
          PUBLIC_LEGACY_WIKI_BASE: >-
            ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.legacy_wiki_base || '' }}
        run: |
          npm ci
          npm run build
      - name: Pages deploy
        uses: cloudflare/wrangler-action@v3
        with:
          # Run from marketing-site so `dist/` and `functions/` resolve (Wrangler 3.x has no
          # `--cwd` for `pages deploy`; wrangler-action defaults to Wrangler 3.x).
          workingDirectory: marketing-site
          # The enterprise repo has a root `pnpm-lock.yaml` for other packages, which makes
          # wrangler-action infer `pnpm` even though this workflow builds with npm. Pin npm
          # so CI runners don't need a global pnpm install.
          packageManager: npm
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name amprealize-marketing
            --branch main
