name: Deploy prod (app.amprealize.ai — authenticated console)

# Entry point for production deploys of the **authenticated console** at
# `app.amprealize.ai` (GUIDEAI-5, M2 origin split). Separate from the
# marketing apex deploy so either origin can ship independently and a bad
# marketing copy change never blocks a console hotfix (and vice versa).
#
# Pipeline lives in `_reusable-release.yml`. We reuse the same API build /
# deploy stages because the backend is shared between origins — but the
# Fly deploy is only triggered from this workflow *or* `deploy-prod.yml`,
# whichever runs first, thanks to the `deploy-prod-saas-api` concurrency
# group. Practically this means only one of the two will call `flyctl
# deploy` per push; the other will no-op on Fly and only push Pages.
#
# Default behaviour:
#   - `VITE_PUBLIC_PREVIEW=0` — auth-gated SaaS shell is exposed.
#     (The marketing apex stays wiki-only regardless.)
#   - `VITE_APP_ORIGIN=console` — injects noindex meta + robots.txt
#     disallow-all via the Vite app-origin plugin.
#
# Kill switch: dispatch this workflow with `public_preview=true` to force
# `VITE_PUBLIC_PREVIEW=1` on `app.amprealize.ai`, which reverts the console
# to wiki-only mode inside one Pages deploy (< 10 min). See
# `docs/runbooks/APP_ORIGIN_SPLIT.md` §"Rollback".

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:
    inputs:
      public_preview:
        description: "Force wiki-only shell on app.amprealize.ai? (kill switch)"
        type: boolean
        default: false

concurrency:
  group: deploy-prod-saas-console
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/_reusable-release.yml
    with:
      environment: prod-saas
      # No Fly deploy here — the marketing workflow owns the API rollout to
      # keep shared-backend deploys serialized. Flip this to
      # `amprealize-api-prod` temporarily if you need to ship an API hotfix
      # alongside a console-only change and the marketing workflow is stuck.
      fly_app: ""
      fly_config: fly.api.toml
      pages_project: amprealize-console
      pages_branch: main
      # Console origin doesn't rebuild the API container; reuse the one
      # pushed by the marketing workflow. Leave `ghcr_image` blank to skip.
      ghcr_image: ""
      vite_api_base_url: https://api.amprealize.ai
      vite_public_preview: ${{ (github.event_name == 'workflow_dispatch' && inputs.public_preview == true) && '1' || '0' }}
      vite_app_origin: console
      smoke_base_url: https://app.amprealize.ai
      run_smoke: true
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
